name: Docker

on:
  push:
    branches:
      - main
      - test
    tags:
      - v*
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Run tests
        run: |
          docker-compose --file docker-compose.test.yml build
          docker-compose --file docker-compose.test.yml run sut

  push:
#    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v1
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Prepare configuration
        run: |
          # Strip git ref prefix from version
          VERSION=$(echo "${{ github.ref }}" | sed -e 's,.*/\(.*\),\1,')

          # Strip "v" prefix from tag name
          [[ "${{ github.ref }}" == "refs/tags/"* ]] && VERSION=$(echo $VERSION | sed -e 's/^v//')

          # Use Docker `latest` tag convention
          [ "$VERSION" == "main" ] && VERSION=latest

          GH_IMAGE_ID=ghcr.io/${{ github.actor }}/latex

          echo VERSION=$VERSION
          echo GH_IMAGE_ID=$GH_IMAGE_ID

          echo "version=${VERSION}" >> $GITHUB_ENV
          echo "github_image_id=${GH_IMAGE_ID}" >> $GITHUB_ENV
          echo "platforms=linux/amd64" >> $GITHUB_ENV

      - name: Build minimal
        id: docker_build_minimal
        uses: docker/build-push-action@v2
        with:
          context: .
          file: Dockerfile.minimal
          load: true
          platforms: ${{ env.platforms }}
          tags: |
            kjarosh/latex:${{ env.version }}-minimal
            ghcr.io/kjarosh/latex:${{ env.version }}-minimal

      - name: Build basic
        id: docker_build_basic
        uses: docker/build-push-action@v2
        with:
          context: .
          file: Dockerfile.basic
          load: true
          platforms: ${{ env.platforms }}
          build-args: |
            IMAGE_MINIMAL=${{ steps.docker_build_minimal.outputs.digest }}
          tags: |
            kjarosh/latex:${{ env.version }}-basic
            ghcr.io/kjarosh/latex:${{ env.version }}-basic

      - name: Build small
        id: docker_build_small
        uses: docker/build-push-action@v2
        with:
          context: .
          file: Dockerfile.small
          load: true
          platforms: ${{ env.platforms }}
          build-args: |
            VERSION=${{ env.version }}
          tags: |
            kjarosh/latex:${{ env.version }}-small
            ghcr.io/kjarosh/latex:${{ env.version }}-small

      - name: Build medium
        id: docker_build_medium
        uses: docker/build-push-action@v2
        with:
          context: .
          file: Dockerfile.medium
          load: true
          platforms: ${{ env.platforms }}
          build-args: |
            VERSION=${{ env.version }}
          tags: |
            kjarosh/latex:${{ env.version }}-medium
            ghcr.io/kjarosh/latex:${{ env.version }}-medium

      - name: Build full
        id: docker_build_full
        uses: docker/build-push-action@v2
        with:
          context: .
          file: Dockerfile.full
          load: true
          platforms: ${{ env.platforms }}
          build-args: |
            VERSION=${{ env.version }}
          tags: |
            kjarosh/latex:${{ env.version }}-full
            ghcr.io/kjarosh/latex:${{ env.version }}-full

      - name: Login to DockerHub
        uses: docker/login-action@v1
        with:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push images
        uses: docker/build-push-action@v2
        with:
          platforms: linux/amd64,linux/arm64
          push: false
          tags: >
            kjarosh/linux:${{ env.version }}-full,
            kjarosh/linux:${{ env.version }}-small,
            kjarosh/linux:${{ env.version }}-basic,
            kjarosh/linux:${{ env.version }}-minimal,
            kjarosh/linux:${{ env.version }}-medium,
            kjarosh/linux:${{ env.version }},
            kjarosh/linux:latest-full,
            kjarosh/linux:latest-small,
            kjarosh/linux:latest-basic,
            kjarosh/linux:latest-minimal,
            kjarosh/linux:latest-medium,
            kjarosh/linux:latest,
            ghcr.io/kjarosh/linux:${{ env.version }}-full,
            ghcr.io/kjarosh/linux:${{ env.version }}-small,
            ghcr.io/kjarosh/linux:${{ env.version }}-basic,
            ghcr.io/kjarosh/linux:${{ env.version }}-minimal,
            ghcr.io/kjarosh/linux:${{ env.version }}-medium,
            ghcr.io/kjarosh/linux:${{ env.version }},
            ghcr.io/kjarosh/linux:latest-full,
            ghcr.io/kjarosh/linux:latest-small,
            ghcr.io/kjarosh/linux:latest-basic,
            ghcr.io/kjarosh/linux:latest-minimal,
            ghcr.io/kjarosh/linux:latest-medium,
            ghcr.io/kjarosh/linux:latest,

      - name: Image digest
        run: |
          echo minimal ${{ steps.docker_build_minimal.outputs.digest }}
          echo basic ${{ steps.docker_build_basic.outputs.digest }}
          echo small ${{ steps.docker_build_small.outputs.digest }}
          echo medium ${{ steps.docker_build_medium.outputs.digest }}
          echo full ${{ steps.docker_build_full.outputs.digest }}

  update-description:
    needs: push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Update repo description
        uses: peter-evans/dockerhub-description@v2
        with:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
          repository: kjarosh/latex
